<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Subtitles</title>
<style>
body{background:black;color:white;font-family:sans-serif;padding:20px;}
.text{font-size:24px;margin-top:15px;}
</style>
</head>
<body>
<select id="lang">
<option value="ko">KR</option>
<option value="de">DE</option>
<option value="fr">FR</option>
<option value="es">ES</option>
<option value="ja">JA</option>
<option value="zh">ZH</option>
</select>
<div class="text" id="en"></div>
<div class="text" id="local"></div>
<script>
let lang = "ko"
const WS_PROTO = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${WS_PROTO}://${location.host}`);
ws.onopen = () => {
ws.send(JSON.stringify({
type:"hello",
role:"mobile",
lang:lang
}))
}
ws.onmessage = e => {
const msg = JSON.parse(e.data)
if(msg.type === "state"){
document.getElementById("en").textContent =
"EN: " + msg.payload.en
document.getElementById("local").textContent =
msg.payload.local
}
}
document.getElementById("lang").onchange = e => {
lang = e.target.value
ws.send(JSON.stringify({
type:"set_lang",
lang:lang
}))
}
</script>
</body>
</html>
