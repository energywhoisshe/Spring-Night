<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subtitles</title>
  <style>
    body { margin:0; background:black; color:white; font-family: system-ui, sans-serif; }
    .top { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.12); }
    select, button { font-size: 16px; padding: 10px; }
    .wrap { padding: 18px; }
    .label { opacity: 0.7; font-size: 14px; margin-top: 18px; }
    .text { font-size: clamp(24px, 6vw, 44px); font-weight: 700; line-height: 1.25; word-break: keep-all; overflow-wrap: anywhere;}
    .live { margin-top: 16px; padding: 12px; border: 1px solid rgba(255,255,255,0.18); border-radius: 14px; background: rgba(255,255,255,0.06); }
    .small { opacity: 0.7; font-size: 12px; margin-top: 6px; }
    #en { opacity:0.85; }
    #local {font-weight: 600;}
  </style>
</head>
<body>
  <div class="top">
    <select id="lang">
        <option value="de">Deutsch / German</option>
        <option value="ko">한국어 / Korean</option>
        <option value="ja">日本語 / Japanese</option>
        <option value="zh">简体中文 / Chinese (Simplified)</option>
        <option value="zh-TW">繁體中文 / Chinese (Traditional)</option>
        <option value="kk">Қазақша / Kazakh</option>
        <option value="uz">Oʻzbek / Uzbek</option>
        <option value="mn">Монгол / Mongolian</option>
        <!--<option value="vi">Tiếng Việt / Vietnamese</option>-->
    </select>
    
    <span id="status" class="small"></span>
  </div>

  <div class="wrap">
    <div class="label">EN</div>
    <div class="text" id="en"></div>

    <div class="label" id="localLabel">Choose Your Language</div>
    <div class="text" id="local"></div>

    <div class="live" id="liveBox" style="display:none;">
      <div class="label">LIVE</div>
      <div class="text" id="liveEn"></div>
      <div class="text" id="liveLocal"></div>
    </div>

    <div id="hint" class="small" style="margin-top:18px; opacity:0.7;">
      Tip: For best viewing, please disable your phone’s auto-lock.
    </div>
  </div>

<script>
  let ws = null;
  let wakeLock = null;
  let reconnectTimer = null;
  let started = false;
  let liveTimer = null;

  const statusEl = document.getElementById('status');
  const langSel = document.getElementById('lang');
  const hintEl = document.getElementById("hint");

  // Show JS is running

  // If any JS error happens, show it on screen (so you don't need DevTools)

  const tips = {
    en: "Tip: For best viewing, please disable your phone’s auto-lock.",
    de: "Tipp: Für die beste Darstellung bitte die automatische Bildschirmsperre deaktivieren.",
    ko: "팁: 더 안정적으로 보려면 휴대폰의 자동 잠금(화면 꺼짐)을 꺼 주세요.",
    ja: "ヒント：より安定して表示するため、スマートフォンの自動ロックをオフにしてください。",
    zh: "提示：为获得更稳定的观看体验，请关闭手机的自动锁屏。",
    "zh-TW": "提示：為了更穩定的觀看體驗，請關閉手機的自動鎖定。",
    kk: "Кеңес: Тұрақты көру үшін телефонның автоматты құлыптауын өшіріңіз.",
    uz: "Maslahat: Barqaror ko‘rish uchun telefoningizning avtomatik qulflashini o‘chiring.",
    mn: "Зөвлөмж: Илүү тогтвортой үзэхийн тулд утасныхаа автоматаар түгжихийг унтраана уу."
  };

  function updateHint() {
    const lang = langSel.value;
    hintEl.textContent = tips[lang] || tips.en;
  }
  updateHint();

  langSel.addEventListener('change', () => {
    document.getElementById('localLabel').textContent = langSel.value.toUpperCase();
    updateHint();
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type:'set_lang', lang: langSel.value }));
    }
  });

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch {}
  }

  function connect() {
    // If opened as file://, location.host is empty and WebSocket() will throw.
    if (!location.host) {
      // opened via file:// – skip websocket
      return;
    }

    if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;

    const WS_PROTO = location.protocol === "https:" ? "wss" : "ws";

    try {
      ws = new WebSocket(`${WS_PROTO}://${location.host}`);
    } catch (e) {
      statusEl.textContent = "WebSocket URL error (check address)";
      return;
    }

    ws.onopen = () => {
      statusEl.textContent = 'Connected';
      ws.send(JSON.stringify({ type:'hello', role:'mobile', lang: langSel.value }));
    };
    ws.onclose = () => {
      statusEl.textContent = 'Disconnected, retrying...';
      scheduleReconnect();
    };
    ws.onerror = () => {
      statusEl.textContent = 'Error, retrying...';
      try { ws.close(); } catch {}
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        document.getElementById('en').textContent = msg.payload.en || '';
        document.getElementById('local').textContent = msg.payload.local || '';
        if (msg.payload.live) showLive(msg.payload.live);
        else hideLive();
      }
    };
  }

  function scheduleReconnect() {
    if (!started) return;
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 1500);
  }

  function showLive(live) {
    document.getElementById('liveBox').style.display = 'block';
    document.getElementById('liveEn').textContent = live.en || '';
    document.getElementById('liveLocal').textContent =  live.local || '';

    if (liveTimer) clearTimeout(liveTimer);
    const ms = Math.max(0, live.expiresAt - Date.now());
    liveTimer = setTimeout(hideLive, ms);
  }

  function hideLive() { document.getElementById('liveBox').style.display = 'none'; }

  // Auto-connect on load
  window.addEventListener("load", async () => {
    started = true;
    await requestWakeLock();
    connect();
  });
</script>
</body>
</html>
