<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Operator</title>
<style>
body{font-family:sans-serif;padding:20px}
.kr{font-size:26px;font-weight:bold}
button{font-size:20px;margin:5px;padding:10px}
</style>
</head>
<body>
<h2>Operator</h2>
<div>현재 큐: <span id="cueId">-</span></div>
<div class="kr" id="kr"></div>
<div>
<button onclick="prev()">PREV</button>
<button onclick="next()">NEXT</button>
</div>
<script>
const WS_PROTO = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${WS_PROTO}://${location.host}`);
ws.onopen = () => {
  ws.send(JSON.stringify({type:"hello",role:"operator"}))
}
ws.onmessage = e => {
  const msg = JSON.parse(e.data)
  if(msg.type === "operator_state"){
    document.getElementById("cueId").textContent = msg.payload.cueId
    document.getElementById("kr").textContent = msg.payload.kr
  }
}
function next(){
ws.send(JSON.stringify({
type:"control",
action:"next"
}))
}
function prev(){
ws.send(JSON.stringify({
type:"control",
action:"prev"
}))
}
</script>
</body>
</html>
