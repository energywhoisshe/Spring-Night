<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Stage</title>
<style>
body{background:black;color:white;margin:0;font-family:sans-serif;}
.line{font-size:5vh;text-align:center;margin:2vh;}
</style>
</head>
<body>
<div class="line" id="en"></div>
<div class="line" id="de"></div>
<script>
const WS_PROTO = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${WS_PROTO}://${location.host}`);
ws.onopen = () => {
ws.send(JSON.stringify({
type:"hello",
role:"stage"
}))
}
ws.onmessage = e => {
const msg = JSON.parse(e.data)
if(msg.type === "state"){
document.getElementById("en").textContent =
"EN: " + msg.payload.en
document.getElementById("de").textContent =
"DE: " + msg.payload.de
}
}
</script>
</body>
</html>
